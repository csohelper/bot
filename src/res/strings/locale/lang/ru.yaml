echo_commands:
  start: |
    Привет!
    Это общажный бот-справочник для чата и локального использования.
    Список доступных команд доступен по команде <b>Команды</b> (или /help)
  invite: |
    Вас нет в чате 1-го общежития МТУСИ, вы можете подать заявку по <a href="{invite}">ссылке</a>
    После подачи, бот автоматически ответит на заявку
  first_start: |
    Так как ты первый, кто запустил бота, вы внесены в качестве администратора чата
  static_help: |
    <b>Актуальный список команд (на {date})</b>
    
    {help}
  help: |
    <b>Карты</b> - скидочные карты всех популярных сетей (или /cards)
    <b>Индекс</b> - индекс общежития (или /index)
    <b>Адрес</b> - адрес общежития (или /address)
    <b>Заведующий</b> - ФИО и номер телефона (или /director)
    <b>ЖКО</b> - вся информация об отделе (или /jko)
    <b>Отдел кадров</b> - вся информация об отделе (или /hr)
    <b>Поликлиника</b> - адрес центра (или /polyclinic)
    <b>Второй Отдел</b> - время и место работы (или /seconddep)
    <b>Военкомат</b> - Лефортовский военный коммисариат (или /miloffice) 
    <b>Библиотека</b> - вся информация о ней (или /library)
    <b>Услуги</b> - список услуг от проживающих (или /services)
    <b>Восточка</b> - график работы и меню кафе (или /vost)
    <b>Восток</b> - кафе на Авиамоторной улице (или /vostok)
    <b>Буфет</b> - Буфет (А) и столовая (УЛК) (или /buffet)
    <b>Столовая</b> - Столовая в Н-317 (или /canteen)
    <b>Неделя</b> - информация о текущей учебной неделе (или /week)
    <b>Софт</b> - полезные программы для учебы (или /soft)
    <b>Душ</b> - график работы (или /shower)
    <b>Кухня</b> - график работы (или /kitchen)
    <b>Прачка</b> - информация о ней (или /laundress)
    <b>Кастелянша</b> - график работы, обмен белья, комната хранения (или /housekeeper)
    <b>Бухгалтерия</b> - расположение, номера и график (или /accounting)
    <b>Команды / Помощь</b> - для вызова данного списка (или /help)
    Остальные команды:
    <b>Деканат</b> (или /dean), <b>Единый Деканат</b> (или /ed), <b>Деканат ИТ</b> (или /deanit),
    <b>Деканат РиТ</b> (или /deanrit), <b>Деканат СиСС</b> (или /deannacs), <b>Деканат КиИБ</b> (или /deancais),
    <b>Деканат ЦЭиМК</b> (или /deandeamc), <b>Иностранный Отдел</b> (или /deanforeign)
    <b>Интернет</b>, <b>Мегафон</b> (или /internet)
